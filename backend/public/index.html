<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      margin-top: 50px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: auto;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div class="card" id="home">
  <h2>🚀 Task Manager</h2>
  <button onclick="showLogin()">Login</button>
  <button onclick="showSignup()">Signup</button>
</div>

<!-- SIGNUP -->
<div class="card hidden" id="signupPage">
  <h2>Signup</h2>

  <input id="name" placeholder="Name">
  <input id="email_signup" placeholder="Email">
  <input id="password_signup" placeholder="Password">

  <select id="role">
    <option value="Member">Member</option>
    <option value="Admin">Admin</option>
  </select>

  <button onclick="signup()">Signup</button>
  <button onclick="goHome()">Back</button>
</div>

<!-- LOGIN -->
<div class="card hidden" id="loginPage">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="goHome()">Back</button>
</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashboardPage">

  <h2>📁 Create Project</h2>
  <input id="projectName" placeholder="Project Name">
  <button onclick="createProject()">Create Project</button>

  <div id="teamSection" class="hidden">
    <h3>👥 Add Team Member</h3>
    <input id="memberUserId" placeholder="User ID">
    <button onclick="addMember()">Add Member</button>
  </div>

  <div id="taskSection" class="hidden">
    <h3>📝 Create Task</h3>
    <input id="taskTitle" placeholder="Task Title">
    <input id="taskDesc" placeholder="Description">
    <input id="assignUserId" placeholder="Assign User ID">
    <button onclick="createTask()">Create Task</button>

    <h3>🔄 Update Task Status</h3>
    <input id="taskId" placeholder="Task ID">

    <select id="status">
      <option value="Pending">Pending</option>
      <option value="Completed">Completed</option>
    </select>

    <button onclick="updateStatus()">Update Status</button>
  </div>

  <h3>📊 Dashboard</h3>
  <button onclick="getDashboard()">Load Stats</button>

  <pre id="output"></pre>

  <button onclick="logout()">Logout</button>

</div>

<script>
let token = "";
let projectId = "";

// NAVIGATION
function showLogin() {
  hideAll();
  document.getElementById("loginPage").classList.remove("hidden");
}

function showSignup() {
  hideAll();
  document.getElementById("signupPage").classList.remove("hidden");
}

function goHome() {
  hideAll();
  document.getElementById("home").classList.remove("hidden");
}

function showDashboard() {
  hideAll();
  document.getElementById("dashboardPage").classList.remove("hidden");
}

function hideAll() {
  document.querySelectorAll(".card").forEach(c => c.classList.add("hidden"));
}

// SIGNUP
async function signup() {
  await fetch("/api/auth/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email_signup.value,
      password: password_signup.value,
      role: role.value
    })
  });

  alert("Signup successful!");
  showLogin();
}

// LOGIN
let userRole = "";

async function login() {
  const res = await fetch("/api/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  token = data.token;

  // 🔥 Decode token to get role
  const payload = JSON.parse(atob(token.split(".")[1]));
  userRole = payload.role;

  alert("Login successful!");
  showDashboard();

  // 🔥 Hide admin features if not admin
  if (userRole !== "Admin") {
    document.getElementById("teamSection").style.display = "none";
    document.getElementById("taskSection").style.display = "none";
  }
}

// CREATE PROJECT
async function createProject() {
  const res = await fetch("/api/projects/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      name: projectName.value
    })
  });

  const data = await res.json();
  projectId = data._id;

  alert("Project created!");

  document.getElementById("teamSection").classList.remove("hidden");
}

// ADD MEMBER
async function addMember() {
  await fetch("/api/projects/add-member", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      projectId,
      userId: memberUserId.value
    })
  });

  alert("Member added!");

  document.getElementById("taskSection").classList.remove("hidden");
}

// CREATE TASK
async function createTask() {
  await fetch("/api/tasks/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      title: taskTitle.value,
      description: taskDesc.value,
      assignedTo: assignUserId.value,
      project: projectId,
      dueDate: new Date()
    })
  });

  alert("Task created!");
}

// UPDATE STATUS
async function updateStatus() {
  await fetch("/api/tasks/update/" + taskId.value, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      status: status.value
    })
  });

  alert("Status updated!");
}

// DASHBOARD
async function getDashboard() {
  const res = await fetch("/api/tasks/dashboard", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();
  output.innerText = JSON.stringify(data, null, 2);
}

// LOGOUT
function logout() {
  token = "";
  projectId = "";
  goHome();
}
</script>

</body>
</html>

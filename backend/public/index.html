<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      margin-top: 50px;
    }
    .card {
      background: white;
      padding: 20px;
      margin: auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- Landing Page -->
<div class="card" id="home">
  <h2>🚀 Task Manager</h2>
  <button onclick="showLogin()">Login</button>
  <button onclick="showSignup()">Signup</button>
</div>

<!-- Signup -->
<div class="card hidden" id="signupPage">
  <h2>Signup</h2>
  <input id="name" placeholder="Name"><br>
  <input id="email_signup" placeholder="Email"><br>
  <input id="password_signup" placeholder="Password"><br>

  <select id="role">
    <option value="Member">Member</option>
    <option value="Admin">Admin</option>
  </select>

  <button onclick="signup()">Signup</button>
  <button onclick="goHome()">Back</button>
</div>

<!-- Login -->
<div class="card hidden" id="loginPage">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="goHome()">Back</button>
</div>

<!-- Dashboard -->
<div class="card hidden" id="dashboardPage">
  <h2>Dashboard</h2>

  <input id="projectName" placeholder="Project Name"><br>
  <button onclick="createProject()">Create Project</button>

  <br><br>
  <button onclick="getDashboard()">Load Stats</button>

  <pre id="output"></pre>

  <button onclick="logout()">Logout</button>
</div>

<script>
let token = "";

// Navigation
function showLogin() {
  hideAll();
  document.getElementById("loginPage").classList.remove("hidden");
}

function showSignup() {
  hideAll();
  document.getElementById("signupPage").classList.remove("hidden");
}

function goHome() {
  hideAll();
  document.getElementById("home").classList.remove("hidden");
}

function showDashboard() {
  hideAll();
  document.getElementById("dashboardPage").classList.remove("hidden");
}

function hideAll() {
  document.querySelectorAll(".card").forEach(c => c.classList.add("hidden"));
}

// Signup
async function signup() {
  await fetch("/api/auth/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email_signup").value,
      password: document.getElementById("password_signup").value,
      role: document.getElementById("role").value
    })
  });

  alert("Signup successful!");
  showLogin();
}

// Login
async function login() {
  const res = await fetch("/api/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();
  token = data.token;

  alert("Login successful!");
  showDashboard();
}

// Create Project
async function createProject() {
  await fetch("/api/projects/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      name: document.getElementById("projectName").value
    })
  });

  alert("Project created!");
}

// Dashboard
async function getDashboard() {
  const res = await fetch("/api/tasks/dashboard", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// Logout
function logout() {
  token = "";
  goHome();
}
</script>

</body>
</html>
